<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep dark with subtle blue -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <!-- Main glow gradient: warm coral to cool violet -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b57"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Inner glow -->
    <linearGradient id="innerGlow" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ff8a73"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Background glow -->
    <filter id="bgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Ambient glow behind the icon -->
  <circle cx="256" cy="240" r="140" fill="url(#glow)" opacity="0.15" filter="url(#bgGlow)"/>

  <!-- Chain links: three interlocking rings representing multi-agent chain -->
  <g filter="url(#softGlow)">
    <!-- Left ring -->
    <circle cx="196" cy="256" r="72" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.9"/>
    <!-- Right ring -->
    <circle cx="316" cy="256" r="72" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.9"/>
    <!-- Center overlap highlight -->
    <ellipse cx="256" cy="256" rx="28" ry="52" fill="none" stroke="url(#innerGlow)" stroke-width="5" opacity="0.7"/>
  </g>

  <!-- Central brain/spark node -->
  <g filter="url(#softGlow)">
    <!-- Core dot -->
    <circle cx="256" cy="256" r="16" fill="url(#glow)"/>
    <!-- Spark rays -->
    <line x1="256" y1="228" x2="256" y2="216" stroke="#ff8a73" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="256" y1="284" x2="256" y2="296" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="228" y1="256" x2="216" y2="256" stroke="#c084fc" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="284" y1="256" x2="296" y2="256" stroke="#c084fc" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Diagonal sparks -->
    <line x1="238" y1="238" x2="230" y2="230" stroke="#ff6b57" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="274" y1="238" x2="282" y2="230" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="238" y1="274" x2="230" y2="282" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="274" y1="274" x2="282" y2="282" stroke="#ff8a73" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Orbiting dots: representing agents -->
  <circle cx="148" cy="196" r="8" fill="#ff6b57" opacity="0.9"/>
  <circle cx="364" cy="196" r="8" fill="#38bdf8" opacity="0.9"/>
  <circle cx="148" cy="316" r="8" fill="#a855f7" opacity="0.9"/>
  <circle cx="364" cy="316" r="8" fill="#34d399" opacity="0.9"/>

  <!-- Text: CM -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="52" fill="url(#glow)" letter-spacing="6" opacity="0.85">ChainMind</text>
</svg>
